<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            overflow: hidden;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: clamp(1rem, 3vw, 1.2rem);
        }

        .score-item {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        #gameCanvas {
            border: 3px solid #4ecca3;
            border-radius: 10px;
            background: #0a0a0a;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
            max-width: 100%;
            max-height: 50vh;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .dpad-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(145deg, #4ecca3, #38b58b);
            color: #1a1a2e;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.4);
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(78, 204, 163, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(145deg, #667eea, #5a67d8);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-size: 16px;
            width: auto;
            padding: 0 25px;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
            border: 2px solid #4ecca3;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: #ff6b6b;
            margin-bottom: 15px;
        }

        .game-over p {
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 20px;
        }

        .instructions {
            margin-top: 15px;
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            color: rgba(255,255,255,0.6);
            text-align: center;
        }

        @media (min-width: 768px) {
            .controls {
                flex-direction: row;
                align-items: center;
            }
            
            .dpad {
                display: grid;
                grid-template-columns: repeat(3, 70px);
                grid-template-rows: repeat(2, 70px);
                gap: 10px;
            }
            
            .btn-up { grid-column: 2; grid-row: 1; }
            .btn-left { grid-column: 1; grid-row: 2; }
            .btn-down { grid-column: 2; grid-row: 2; }
            .btn-right { grid-column: 3; grid-row: 2; }
        }

        @media (max-width: 767px) {
            .dpad {
                display: grid;
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(2, 60px);
                gap: 8px;
            }
            
            .btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            
            .btn-up { grid-column: 2; grid-row: 1; }
            .btn-left { grid-column: 1; grid-row: 2; }
            .btn-down { grid-column: 2; grid-row: 2; }
            .btn-right { grid-column: 3; grid-row: 2; }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    
    <div class="score-board">
        <div class="score-item">分数：<span id="score">0</span></div>
        <div class="score-item">最高：<span id="highScore">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="controls">
        <div class="dpad">
            <button class="btn btn-up" data-dir="up">⬆️</button>
            <button class="btn btn-left" data-dir="left">⬅️</button>
            <button class="btn btn-down" data-dir="down">⬇️</button>
            <button class="btn btn-right" data-dir="right">➡️</button>
        </div>
        <div style="margin-top: 15px;">
            <button class="btn btn-secondary" id="startBtn">开始</button>
            <button class="btn btn-secondary" id="pauseBtn">暂停</button>
        </div>
    </div>
    
    <p class="instructions">
        📱 手机端：使用方向键控制<br>
        💻 电脑端：方向键或 WASD 控制<br>
        🎮 也可以滑动屏幕控制方向
    </p>
    
    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>你的分数：<span id="finalScore">0</span></p>
        <button class="btn btn-secondary" onclick="resetGame()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 150;
        let isGameRunning = false;
        let isPaused = false;

        highScoreEl.textContent = highScore;

        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreEl.textContent = score;
            placeFood();
        }

        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画网格
            ctx.strokeStyle = '#1a1a1a';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 画食物
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // 画蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#5fd9a8');
                    gradient.addColorStop(1, '#4ecca3');
                } else {
                    gradient.addColorStop(0, '#4ecca3');
                    gradient.addColorStop(1, '#38b58b');
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();

                // 画蛇眼睛（头部）
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeOffset = gridSize / 4;
                    const eyeSize = 3;
                    
                    if (direction.x === 1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.x === -1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.y === -1) {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(segment.x * gridSize + 6, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(segment.x * gridSize + gridSize - 6, segment.y * gridSize + gridSize - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
        }

        function update() {
            direction = { ...nextDirection };
            
            const head = { 
                x: snake[0].x + direction.x, 
                y: snake[0].y + direction.y 
            };

            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 撞自己检测
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                placeFood();
                
                // 加速
                if (gameSpeed > 80) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        function gameStep() {
            if (!isPaused) {
                update();
                draw();
            }
        }

        function startGame() {
            if (isGameRunning) return;
            
            initGame();
            isGameRunning = true;
            isPaused = false;
            gameSpeed = 150;
            gameLoop = setInterval(gameStep, gameSpeed);
            startBtn.textContent = '游戏中...';
            startBtn.disabled = true;
            gameOverEl.classList.remove('show');
        }

        function pauseGame() {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
        }

        function gameOver() {
            clearInterval(gameLoop);
            isGameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            
            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
            startBtn.textContent = '开始游戏';
            startBtn.disabled = false;
        }

        function resetGame() {
            gameOverEl.classList.remove('show');
            startGame();
        }

        function changeDirection(newDir) {
            const directions = {
                up: { x: 0, y: -1 },
                down: { x: 0, y: 1 },
                left: { x: -1, y: 0 },
                right: { x: 1, y: 0 }
            };
            
            const dir = directions[newDir];
            if (dir && (dir.x !== -direction.x || dir.y !== -direction.y)) {
                nextDirection = dir;
            }
        }

        // 按钮控制
        document.querySelectorAll('.btn[data-dir]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                changeDirection(btn.dataset.dir);
            });
            
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                changeDirection(btn.dataset.dir);
                btn.style.transform = 'scale(0.95)';
            });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.style.transform = 'scale(1)';
            });
        });

        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', pauseGame);

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                KeyW: 'up', KeyS: 'down', KeyA: 'left', KeyD: 'right'
            };
            
            if (keyMap[e.code]) {
                e.preventDefault();
                changeDirection(keyMap[e.code]);
            }
            
            if (e.code === 'Space' && isGameRunning) {
                e.preventDefault();
                pauseGame();
            }
            
            if (e.code === 'Enter' && !isGameRunning) {
                e.preventDefault();
                startGame();
            }
        });

        // 滑动控制
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                changeDirection(diffX > 0 ? 'right' : 'left');
            } else {
                changeDirection(diffY > 0 ? 'down' : 'up');
            }

            touchStartX = 0;
            touchStartY = 0;
        }, { passive: true });

        // 初始绘制
        initGame();
        draw();
    </script>
</body>
</html>
